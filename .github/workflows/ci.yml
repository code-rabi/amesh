name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Verify JavaScript workspace
        run: corepack pnpm check

      - name: Verify Go workspace
        run: go test ./...

      - name: Verify shell scripts
        run: |
          bash -n scripts/dev-daemon.sh
          bash -n scripts/sentrux-check.sh
          sh -n install-amesh-node.sh
          sh -n scripts/install-amesh-node.sh

  knip:
    name: Knip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run Knip
        run: corepack pnpm check:knip

  sentrux:
    name: Sentrux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Sentrux
        run: bash scripts/sentrux-check.sh
