name: Build Node Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          bin_name="amesh-node"
          cli_name="amesh"
          if [ "${GOOS}" = "windows" ]; then
            bin_name="amesh-node.exe"
            cli_name="amesh.exe"
          fi
          go build -trimpath -ldflags="-s -w" -o "dist/${bin_name}" ./cmd/amesh-node
          go build -trimpath -ldflags="-s -w" -o "dist/${cli_name}" ./cmd/amesh

      - name: Run Go tests
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go test ./...

      - name: Package tar.gz artifact
        if: matrix.archive_ext == 'tar.gz'
        run: |
          asset_base="amesh-node-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p package
          cp README.md package/
          cp install-amesh-node.sh package/
          cp dist/amesh-node package/
          cp dist/amesh package/
          tar -C package -czf "dist/${asset_base}.tar.gz" .

      - name: Package zip artifact
        if: matrix.archive_ext == 'zip'
        run: |
          asset_base="amesh-node-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p package
          cp README.md package/
          cp install-amesh-node.sh package/
          cp dist/amesh-node.exe package/
          cp dist/amesh.exe package/
          cd package
          zip -r "../dist/${asset_base}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amesh-node-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/amesh-node-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: main-${{ github.sha }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: amesh-node-*
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        run: |
          short_sha="${GITHUB_SHA::7}"
          title="main ${short_sha}"
          notes=$(cat <<EOF
          Automated release for \`${GITHUB_SHA}\`.

          Install the latest node release:

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/install-amesh-node.sh | bash
          \`\`\`
          EOF
          )

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release-assets/* --clobber
          else
            gh release create "${RELEASE_TAG}" release-assets/* \
              --title "${title}" \
              --notes "${notes}" \
              --target "${GITHUB_SHA}"
          fi
